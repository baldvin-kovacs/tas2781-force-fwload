# Disable HDA controller power save.
#
# Part of the tested tas2781-force-fwload configuration: with power_save
# active the HDA link (and with it the TAS2781 side-codec path) is powered
# down after short silences, multiplying the shutdown/power-up round trips
# that kill the woofer DSP on affected machines.
#
# Tradeoff: slightly higher idle power draw on the audio path.
options snd_hda_intel power_save=0
