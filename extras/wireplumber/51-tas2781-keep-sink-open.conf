# OPTIONAL — hide the ~2.5 s re-staging lead-in by keeping the speaker
# sink open, so PCM closes (and therefore full DSP re-staging on the next
# open) become rare.
#
# With tas2781-force-fwload active, every fresh stream open re-stages the
# amplifier DSPs over i2c, which costs roughly 2.5 s of silence at the
# start of playback after the sink has suspended. Disabling sink suspend
# makes that a once-per-boot cost instead of a once-per-song cost, and
# stops short notification sounds from being swallowed.
#
# Tradeoff: the ALSA device stays open, costing some idle power.
#
# To use, copy to either:
#   /etc/wireplumber/wireplumber.conf.d/          (system-wide)
#   ~/.config/wireplumber/wireplumber.conf.d/     (per user)
# and restart WirePlumber (systemctl --user restart wireplumber).
#
# The node.name match below covers all ALSA outputs; narrow it to your
# speaker sink (find it with `wpctl status`) if you prefer.
monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_output.*" }
    ]
    actions = {
      update-props = {
        session.suspend-timeout-seconds = 0
      }
    }
  }
]
